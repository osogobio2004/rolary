<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rolary-Save File{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FDFBF7;
            --mint-green: #D4EDDA;
            --pastel-pink: #FFD1DC;
            --warm-gray: #7A706A; 
            --card-bg: #FFFFFF;
        }
        body {
            background-color: var(--bg-cream);
            color: var(--warm-gray);
            font-family: 'Quicksand', sans-serif;
        }
        .navbar-cozy {
            background-color: var(--mint-green);
            border-bottom: 4px solid var(--pastel-pink);
        }
        .navbar-brand, .nav-link { color: var(--warm-gray) !important; font-weight: 700; }
        .nav-link:hover { color: #d1889c !important; }
        .cozy-card {
            background-color: var(--card-bg);
            border: 3px solid var(--pastel-pink);
            border-radius: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            padding: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-cozy">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}"> <i>Save File</i></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Estadísticas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'misiones' %}">Libro de Misiones</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'recuerdos' %}">Recuerdos</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container mt-5">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
